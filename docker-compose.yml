networks:
  blackbox:
    external:
      name: blackbox

volumes:
  pgsql:
    driver: local
  xback:
    driver: local
  xfile:
    driver: local

services:
  ict_base:
    image: postgres:18-alpine
    container_name: ict_base
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_DB=${PG_DATA:-ict}
      - POSTGRES_BACKUP=${PG_BACK:-ict_backup}
      - POSTGRES_USER=${PG_USER:-dbe}
      - POSTGRES_PASSWORD=${PG_PASS:-rahasia}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
      - TZ=${TZ:-Asia/Jakarta}
    ports:
      - "36661:5432"
    volumes:
      - pgsql:/var/lib/postgresql
      - ./ict_base/pgbouncer.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-dbe} -d ${PG_DATA:-ict}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      blackbox:
        ipv4_address: 172.99.66.1

  ict_pool:
    image: edoburu/pgbouncer:latest
    container_name: ict_pool
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - DB_HOST=${PG_HOST:-ict_base}
      - DB_PORT=${PG_PORT:-5432}
      - DB_NAME=${PG_DATA:-ict}
      - DB_USER=${PG_USER:-dbe}
      - DB_PASSWORD=${PG_PASS:-rahasia}
      - AUTH_TYPE=scram-sha-256
      - POOL_MODE=transaction
      - DEFAULT_POOL_SIZE=20
      - MAX_CLIENT_CONN=1000
      - TZ=${TZ:-Asia/Jakarta}
    ports:
      - "36662:5432"
    volumes:
      - ./ict_base/pgbouncer.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      ict_base:
        condition: service_healthy
    restart: always
    networks:
      blackbox:
        ipv4_address: 172.99.66.2

  ict_rest:
    build:
      context: ./ict_rest
      dockerfile: Dockerfile
    container_name: ict_rest
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - PG_HOST=${PG_POOL:-ict_pool}
      - PG_PORT=${PG_PORT:-5432}
      - PG_USER=${PG_USER:-dbe}
      - PG_PASS=${PG_PASS:-rahasia}
      - PG_DATA=${PG_DATA:-ict}
      - IS_POOL=${IS_POOL:-true}
      - RE_SECRET=${RE_SECRET:-rahasia}
      - TZ=${TZ:-Asia/Jakarta}
    ports:
      - "36665:36665"
    depends_on:
      - ict_pool
    restart: always
    volumes:
      - xfile:/root/files:rw
    networks:
      blackbox:
        ipv4_address: 172.99.66.5

  ict_site:
    build:
      context: ./ict_site
      dockerfile: Dockerfile
    container_name: ict_site
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - BE_POOL=${BE_POOL:-http://ict_rest:36665}
      - WS_NAME=${WS_NAME:-OmniSight}
      - WS_META=${WS_META:-OmniSight}
      - WS_DESC=${WS_DESC:-OmniSight}
      - TZ=${TZ:-Asia/Jakarta}
    ports:
      - "36666:36666"
    depends_on:
      - ict_rest
    restart: always
    volumes:
      - xfile:/app/files:ro
    networks:
      blackbox:
        ipv4_address: 172.99.66.6

  ict_log_nginx:
    build:
      context: ./ict_auto/ict_log_nginx
      dockerfile: Dockerfile
    container_name: ict_log_nginx
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - PG_HOST=${PG_POOL:-ict_pool}
      - PG_PORT=${PG_PORT:-5432}
      - PG_USER=${PG_USER:-dbe}
      - PG_PASS=${PG_PASS:-rahasia}
      - PG_DATA=${PG_DATA:-ict}
      - IS_POOL=${IS_POOL:-true}
      - FT_HTTP=${FT_HTTP:-150}
      - ES_LINK=${ES_LINK:-http://elasticsearch:9200}
      - TZ=${TZ:-Asia/Jakarta}
    depends_on:
      - ict_pool
    restart: always
    networks:
      blackbox:
        ipv4_address: 172.99.66.11

  ict_log_rotate:
    build:
      context: ./ict_auto/ict_log_rotate
      dockerfile: Dockerfile
    container_name: ict_log_rotate
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - PG_HOST=${PG_POOL:-ict_pool}
      - PG_PORT=${PG_PORT:-5432}
      - PG_USER=${PG_USER:-dbe}
      - PG_PASS=${PG_PASS:-rahasia}
      - PG_DATA=${PG_DATA:-ict}
      - IS_POOL=${IS_POOL:-true}
      - RE_PATH=${RE_PATH:-log_rotate}
      - RE_NORMAL=${RE_NORMAL:-7}
      - RE_ATTACK=${RE_ATTACK:-90}
      - TZ=${TZ:-Asia/Jakarta}
    volumes:
      - xback:/var/log/auto
    depends_on:
      - ict_pool
    restart: always
    networks:
      blackbox:
        ipv4_address: 172.99.66.12
