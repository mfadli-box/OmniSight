openapi: 3.0.3
info:
  title: OmniSight API - SM02 (Module Management)
  description: |
    Endpoint manajemen modul: CRUD modul untuk sidebar navigation.
    Bagian dari modul **System Manager (SM)**. Hanya bisa diakses oleh **Admin**.
  version: 1.0.0

servers:
  - url: http://localhost:36665
    description: Local Development

tags:
  - name: SM02
    description: Module Management (Admin only)

paths:
  /rest/pages/admin/SM02:
    get:
      operationId: listModule
      tags: [SM02]
      summary: Daftar modul
      description: |
        Mengambil daftar modul dengan pagination, search, dan sorting.
        Menggunakan `ActionMeta` sebagai query parameter.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortByParam"
        - $ref: "#/components/parameters/SortOrderParam"
      responses:
        "200":
          description: Berhasil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleListResponse"
              example:
                message: Modules retrieved
                data:
                  - id: "mod-001"
                    parent_id: ""
                    code: SP
                    name: Session Profile
                    path: ""
                    is_page: false
                    is_active: true
                    created_at: "2026-07-01T00:00:00Z"
                meta:
                  page: 1
                  size: 10
                  total: 1
                  total_pages: 1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      operationId: createModule
      tags: [SM02]
      summary: Buat modul baru
      description: Membuat modul baru untuk sidebar navigation.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleCreateRequest"
            example:
              parent_id: ""
              code: AS
              name: Asset Management
              path: /board/pages/AS
              is_page: false
              is_active: true
      responses:
        "201":
          description: Modul berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: Module created successfully
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Conflict"

  /rest/pages/admin/SM02/{id}:
    put:
      operationId: updateModule
      tags: [SM02]
      summary: Update modul
      description: Memperbarui data modul berdasarkan ID.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleUpdateRequest"
            example:
              name: Asset Management Updated
              is_active: true
      responses:
        "200":
          description: Modul berhasil diupdate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: Module updated successfully
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Module ID
    SearchParam:
      name: search
      in: query
      schema:
        type: string
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 10
        maximum: 100
    SortByParam:
      name: sort_by
      in: query
      schema:
        type: string
    SortOrderParam:
      name: sort_order
      in: query
      schema:
        type: string
        enum: [asc, desc]

  schemas:
    ModuleListItem:
      type: object
      properties:
        id:
          type: string
        parent_id:
          type: string
        code:
          type: string
        name:
          type: string
        path:
          type: string
        is_page:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: string

    ModuleCreateRequest:
      type: object
      required: [code, name, path]
      properties:
        parent_id:
          type: string
          description: ID parent module (kosongkan untuk root)
        code:
          type: string
          description: Kode unik modul (2 huruf kapital)
          example: AS
        name:
          type: string
          description: Nama modul
          example: Asset Management
        path:
          type: string
          description: Path route frontend
          example: /board/pages/AS
        is_page:
          type: boolean
          default: false
        is_active:
          type: boolean
          default: true

    ModuleUpdateRequest:
      type: object
      properties:
        parent_id:
          type: string
        code:
          type: string
        name:
          type: string
        path:
          type: string
        is_page:
          type: boolean
          nullable: true
        is_active:
          type: boolean
          nullable: true

    GridMeta:
      type: object
      properties:
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    ModuleListResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/ModuleListItem"
        meta:
          $ref: "#/components/schemas/GridMeta"

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        error:
          type: string
        request_id:
          type: string

  responses:
    ValidationError:
      description: Input tidak valid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Tidak terautentikasi
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Akses ditolak (non-admin)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource tidak ditemukan
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Data duplikat
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
